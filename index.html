<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to CrownDrive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap');
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: background.png;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
       
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: -200px;
        }
       
        .logo {
            margin-bottom: 15px;
        }
       
        .logo-icon {
            width: 190px;
            height: auto;
        }
       
        .login-card {
            background: #d9e8f5;
            border-radius: 10px;
            padding: 25px 30px 22px 30px;
            width: 340px;
            box-shadow: none;
        }
       
        .login-card h1 {
            font-size: 20px;
            font-weight: 700;
            color: #000;
            margin-bottom: 18px;
        }
       
        .input-group {
            margin-bottom: 12px;
            text-align: left;
        }
       
        .input-wrapper {
            position: relative;
        }
       
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #b8b8b8;
            border-radius: 12px;
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
            background: white;
        }
       
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #0078d4;
        }
       
        input[type="password"],
        input[type="text"].password-field {
            padding-right: 40px;
        }
       
        .eye-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
        }

        .eye-toggle:hover {
            color: #333;
        }

        .eye-toggle svg {
            width: 18px;
            height: 18px;
            pointer-events: none;
        }
       
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
        }
       
        input[type="checkbox"] {
            width: 17px;
            height: 17px;
            margin-right: 7px;
            accent-color: #7c3aed;
            cursor: pointer;
        }
       
        .checkbox-group label {
            font-size: 12px;
            color: #000;
            cursor: pointer;
            font-weight: 600;
        }
       
        .login-btn {
            width: 100%;
            padding: 10px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 14px;
        }
       
        .login-btn:hover {
            background: #6d28d9;
        }
       
        .arrow-icon {
            font-size: 18px;
        }
       
        .device-login,
        .forgot-password {
            display: block;
            text-align: center;
            color: #000;
            font-size: 13px;
            text-decoration: none;
            font-weight: 700;
            margin-bottom: 10px;
            padding: 6px;
        }
       
        .device-login:hover,
        .forgot-password:hover {
            color: #0078d4;
        }
       
        .footer {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }
       
        .footer-tagline {
            background: #d9e8f5;
            padding: 7px 18px;
            border-radius: 15px;
            display: inline-block;
            font-size: 12px;
            color: #000;
            font-weight: 600;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://i.ibb.co/hRjB2V7Y/logo.png" alt="CrownDrive Logo" class="logo-icon" style="margin-top: 10vmax;">
        </div>
       
        <div class="login-card">
            <h1>Log in to CrownDrive</h1>
           
            <form method="POST"">
                <div class="input-group">
                    <input type="text" name="username" id="username" placeholder="Account name or email">
                </div>
               
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="password" name="password" id="password" class="password-field" placeholder="Password">
                        <button type="button" class="eye-toggle" onclick="togglePassword()" id="eyeToggle" aria-label="Toggle password visibility">
                            <!-- Eye open icon (shown when password is hidden) -->
                            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <!-- Eye closed icon (shown when password is visible) -->
                            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>
               
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">Remember me</label>
                </div>
               
                <button type="submit" class="login-btn">
                    <span class="arrow-icon">→</span>
                    <span>Log in</span>
                </button>
               
                <a href="#" class="device-login">Log in with a device</a>
               
                <a href="#" class="forgot-password">Forgot password?</a>
            </form>
        </div>
    </div>
   
    <div class="footer">
        <div class="footer-tagline">CrownDrive – a safe home for all your data</div>
    </div>
   
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');

            const isHidden = passwordInput.getAttribute('type') === 'password';

            if (isHidden) {
                passwordInput.setAttribute('type', 'text');
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            } else {
                passwordInput.setAttribute('type', 'password');
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            }
        }
    </script>
</body>
</html>
